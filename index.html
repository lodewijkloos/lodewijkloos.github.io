<!DOCTYPE html>
<html>
<style type="text/css">
        body
		{
			padding:0;
			margin:0;  
		} 
		#a
		{         
			width:400px;
			height:400px;                                      
			background:url("drawbug_flat_design.svg");     
			background-size:contain;   	  
			background-repeat:no-repeat;  
		}


</style>             
<script type="text/javascript">
	function scalePage()
	{
		var w = window.innerWidth;
		var h = window.innerHeight;
		
		var s = document.getElementById("a")
		s.style.width = w + "px";
		s.style.height = h + "px";
	}
	
	function onReady()
	{                                  
    	scalePage();
	} 
	function onResize()
	{
		scalePage();		                                 
	}  
	


</script>


<body onload="onReady()" onresize="onResize()">

<div id="a"></div>



</body>
</html>
