<!DOCTYPE html>
<html>
<style type="text/css">
  html,body
	{
		padding:0px;
		margin:0px;
		background:#00CCCC;
		color:black;
		font-size:24pt;
    font-family: "Comic Sans MS", sans-serif;
	}
  section
  {
    left:10%;
    width: 80%;
    position: absolute;
    top: 50%;
    text-align: center;
    transform: translateY(-50%);
  }
</style>

<body onload="f();">
  <section id="content">
    BE YOURSELF UNLESS YOU CAN BE VINITA
  </section>
  <script type="text/javascript">
    var f = function() {
      var sayings = [
        "BE YOURSELF UNLESS YOU CAN BE VINITA"
      ];
      var content = document.getElementById("content");
      var i = Math.floor(Math.random() * sayings.length);
      content.innerHTML = sayings[i];
    }
  </script>
</body>
</html>
